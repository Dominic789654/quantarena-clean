name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        # Full default ruleset; the legacy debt was cleared in one pass and
        # config-level exemptions (E402, kronos star-imports) live in
        # pyproject.toml with rationale.
        run: ruff check .

      - name: Repository smoke check
        run: python -m quantarena.cli smoke --json

      - name: Run test suite
        run: pytest tests/ -q
