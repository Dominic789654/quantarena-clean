# Deep Fund Configuration - Passive Personality
# Index-style passive investing with minimal trading
exp_name: "passive-test"

# Investment personality
personality: "passive"

# Trading settings
cashflow: 100000
tickers:
  - MSFT
  - NVDA
  - TSLA

# Analysts to run, refer to graph.constants.py
workflow_analysts:
  - fundamental
  - company_news
  - technical
  - insider

# DeepSeek official API (matches the REASONING_MODEL_* stack in .env)
# Using deepseek-v4-flash model
llm:
  provider: "DeepSeek"
  model: "deepseek-v4-flash"
