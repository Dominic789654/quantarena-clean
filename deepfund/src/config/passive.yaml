# Deep Fund Configuration - Passive Personality
# Index-style passive investing with minimal trading
exp_name: "passive-test"

# Investment personality
personality: "passive"

# Trading settings
cashflow: 100000
tickers:
  - MSFT
  - NVDA
  - TSLA

# Analysts to run, refer to graph.constants.py
workflow_analysts:
  - fundamental
  - company_news
  - technical
  - insider

# YiZhan is a unified API proxy for all LLM models
# Using deepseek-v3.2 model
llm:
  provider: "YiZhan"
  model: "deepseek-v3.2"
