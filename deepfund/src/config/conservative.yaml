# Deep Fund Configuration - Conservative Personality
# Capital preservation focused with low risk tolerance
exp_name: "conservative-test"

# Investment personality
personality: "conservative"

# Trading settings
cashflow: 100000
tickers:
  - MSFT
  - NVDA
  - TSLA

# Analysts to run, refer to graph.constants.py
workflow_analysts:
  - fundamental
  - company_news
  - technical
  - insider

# YiZhan is a unified API proxy for all LLM models
# Using deepseek-v3.2 model
llm:
  provider: "YiZhan"
  model: "deepseek-v3.2"
