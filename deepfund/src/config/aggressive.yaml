# Deep Fund Configuration - Aggressive Personality
# Growth oriented with high risk tolerance for maximum returns
exp_name: "aggressive-test"

# Investment personality
personality: "aggressive"

# Trading settings
cashflow: 100000
tickers:
  - MSFT
  - NVDA
  - TSLA

# Analysts to run, refer to graph.constants.py
workflow_analysts:
  - fundamental
  - company_news
  - technical
  - insider

# DeepSeek official API (matches the REASONING_MODEL_* stack in .env)
# Using deepseek-v4-flash model
llm:
  provider: "DeepSeek"
  model: "deepseek-v4-flash"
